
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    # 아래 ${}부분은 pod를 실행하는 시점에 k8s의 secret자원에서 불러와서 주입
    url: jdbc:mariadb://${DB_HOST}:3306/ordersystem?useSSL=true
    username: admin
    password: ${DB_PW}
  jpa:
    database: mysql
    database-platform: org.hibernate.dialect.MariaDBDialect
    generate-ddl: true
    hibernate:
      ddl-auto : update
    show_sql: true
#    spring의 파일업로드 시 10MB 디폴트
  servlet:
    multipart:
      max-file-size: 1000MB
      max-request-size: 1000MB
  redis:
    host: my-redis
    port: 6379
